name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & typecheck ─────────────────────────────────────────────────────────
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # ── API unit tests ────────────────────────────────────────────────────────────
  test-api:
    name: API unit tests (Jest)
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: cd apps/api && pnpm test --forceExit --passWithNoTests

  # ── Web unit tests ────────────────────────────────────────────────────────────
  test-web:
    name: Web unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: cd apps/web && pnpm test

  # ── E2E tests ─────────────────────────────────────────────────────────────────
  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: calculator
          POSTGRES_PASSWORD: calculator
          POSTGRES_DB: calculator_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://calculator:calculator@localhost:5432/calculator_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test
      VITE_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run DB migrations & seed
        run: cd apps/api && pnpm prisma migrate deploy && pnpm prisma db seed

      - name: Start API
        run: cd apps/api && pnpm run dev &
        env:
          PORT: 3000

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && break
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

      - name: Start web
        run: cd apps/web && pnpm run dev &

      - name: Wait for web
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && break
            echo "Waiting for web... ($i/20)"
            sleep 2
          done

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run Playwright tests (Chromium only in CI)
        run: cd e2e && npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
