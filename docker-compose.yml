version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calculator
      POSTGRES_PASSWORD: calculator
      POSTGRES_DB: calculator_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calculator"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PostgreSQL (isolated test database) ───────────────────────────────────────
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calculator
      POSTGRES_PASSWORD: calculator
      POSTGRES_DB: calculator_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # in-memory: fast, discarded on stop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calculator"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["test"]

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── NestJS API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://calculator:calculator@db:5432/calculator_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173,http://localhost:3010
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./apps/api/nest-cli.json:/app/apps/api/nest-cli.json
      - ./packages/types/src:/app/packages/types/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── DB migrations + seed (runs once, then exits) ──────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://calculator:calculator@db:5432/calculator_dev
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app/apps/api &&
             pnpm prisma migrate deploy &&
             pnpm prisma db seed"
    restart: "no"

  # ── API unit tests (Jest, no DB required — services use mocked Prisma) ─────────
  test-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://calculator:calculator@db-test:5432/calculator_test
      JWT_SECRET: test-secret
      NODE_ENV: test
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/types/src:/app/packages/types/src
    command: >
      sh -c "cd /app/apps/api && pnpm test --forceExit --passWithNoTests"
    restart: "no"
    profiles: ["test"]

  # ── Web unit tests (Vitest, jsdom — no network required) ──────────────────────
  test-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/types/src:/app/packages/types/src
    command: >
      sh -c "cd /app/apps/web && pnpm test"
    restart: "no"
    profiles: ["test"]

  # ── Playwright E2E tests (runs against the live stack) ───────────────────────
  test-e2e:
    image: mcr.microsoft.com/playwright:v1.50.1-jammy
    working_dir: /app/e2e
    volumes:
      - ./e2e:/app/e2e
    environment:
      PLAYWRIGHT_BASE_URL: http://web:5173
      API_URL: http://api:3000
    command: >
      sh -c "npm install && npx playwright test --config playwright.config.ts --project=chromium"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    profiles: ["test"]

  # ── React + Vite Frontend ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "3010:5173"
    environment:
      VITE_API_URL: http://localhost:3000
      # Tell Vite's HMR client to connect on the host-side port (3010),
      # not the internal container port (5173).
      VITE_HMR_PORT: 3010
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/types/src:/app/packages/types/src
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
